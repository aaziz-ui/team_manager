{% extends "base.html" %}
{% block title %}Edit report{% endblock %}
{% block content %}

<div class="card" style="max-width:600px">
  <div class="card-header"><h2>Edit report — {{ report.user.full_name }}, {{ report.report_date.strftime('%A, %b %d, %Y') }}</h2></div>
  <form method="post">
    <label>Content</label>
    <textarea name="content" rows="6" required>{{ report.content }}</textarea>
    <button type="submit" class="btn btn-primary">Save</button>
  </form>
</div>
<a href="{{ url_for('reports.index', date=report.report_date.isoformat()) }}" class="muted">&larr; back to reports</a>
{% endblock %}
